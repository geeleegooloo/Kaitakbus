<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>承景街巴士到站時間</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:15px;
}

.header{
background:#d61f26;
border-radius:20px;
padding:15px;
margin-bottom:12px;
}

.title{
font-size:28px;
font-weight:bold;
}

.weather{
margin-top:6px;
font-size:16px;
}

.clock{
font-size:30px;
font-weight:bold;
margin-top:8px;
}

.card{
background:#111;
border-radius:18px;
padding:20px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
flex:1;
}

.route{
font-size:42px;
font-weight:bold;
}

.dest{
font-size:16px;
color:#999;
margin-top:4px;
}

.right{
text-align:right;
}

.first{
font-size:26px;
font-weight:bold;
color:#00ff66;
}

.second{
font-size:16px;
color:#999;
margin-top:4px;
}

.arriving{
color:#ffd600;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
opacity:0.4;
}
}

.footer{
text-align:center;
color:#666;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
🚍 承景街
</div>

<div class="weather" id="weather">
載入天氣中...
</div>

<div class="clock" id="clock">
--
</div>

</div>

<div class="card">
<div class="left">
<div class="route">20A</div>
<div class="dest">西九龍站</div>
</div>
<div class="right" id="eta20A">
--
</div>
</div>

<div class="card">
<div class="left">
<div class="route">22</div>
<div class="dest">九龍塘（又一城）</div>
</div>
<div class="right" id="eta22">
--
</div>
</div>

<div class="card">
<div class="left">
<div class="route">22D</div>
<div class="dest">啟德站</div>
</div>
<div class="right" id="eta22D">
--
</div>
</div>

<div class="card">
<div class="left">
<div class="route">22M</div>
<div class="dest">土瓜灣</div>
</div>
<div class="right" id="eta22M">
--
</div>
</div>

<div class="card">
<div class="left">
<div class="route">5R</div>
<div class="dest">觀塘（APM）</div>
</div>
<div class="right" id="eta5R">
--
</div>
</div>

<div class="footer">
承景街（003790）｜ 每15秒更新
</div>

<script>

const STOP_ID = "003790";

const ROUTES = [
"20A",
"22",
"22D",
"22M",
"5R"
];

function updateClock(){

document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString("zh-HK");

}

setInterval(updateClock,1000);
updateClock();

async function loadWeather(){

try{

const res = await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
);

const data = await res.json();

const temp =
data.temperature.data[1].value;

const humidity =
data.humidity.data[0].value;

document.getElementById("weather").innerHTML =
`🌡️ ${temp}°C　💧 ${humidity}%`;

}catch(e){

document.getElementById("weather").innerHTML =
"天氣資料未能載入";

}
}

async function loadETA(route){

try{

const res = await fetch(
`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/ctb/${STOP_ID}/${route}`
);

const json = await res.json();

const target =
document.getElementById(
"eta" + route
);

if(
!json.data ||
json.data.length === 0
){

target.innerHTML="--";
return;

}

const firstEta =
new Date(json.data[0].eta);

const firstMin =
Math.round(
(firstEta - new Date())
/
60000
);

let firstText;

if(firstMin <= 1){

firstText =
'<div class="first arriving">🏃趕唔切啦</div>';

}else{

firstText =
`<div class="first">${firstMin}分鐘</div>`;

}

let secondText = "";

if(
json.data.length > 1 &&
json.data[1].eta
){

const secondEta =
new Date(json.data[1].eta);

const secondMin =
Math.round(
(secondEta - new Date())
/
60000
);

secondText =
`<div class="second">
下班 ${secondMin}分鐘
</div>`;
}

target.innerHTML =
firstText + secondText;

}catch(e){

console.log(e);

}
}

async function refreshETA(){

for(const route of ROUTES){

await loadETA(route);

}

}

loadWeather();
refreshETA();

setInterval(
refreshETA,
15000
);

setInterval(
loadWeather,
600000
);

</script>

</body>
</html>
