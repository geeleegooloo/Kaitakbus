<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>承景街巴士站</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:10px;
}

.header{

background:#d61f26;

border-radius:16px;

padding:12px 18px;

margin-bottom:12px;

display:flex;

justify-content:space-between;

align-items:flex-start;
}

.header-left{
flex:1;
}

.header-right{
text-align:right;
}

.title{

font-size:28px;

font-weight:700;

margin-bottom:6px;
}

.weather{

font-size:16px;

margin-bottom:4px;
}

.warning{

font-size:15px;

font-weight:700;

color:#ffe082;
}

.clock{

font-size:42px;

font-weight:700;

line-height:1;
}

.date{

font-size:15px;

margin-top:5px;
}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;
}

.card{

background:#080808;

border:1px solid #1c1c1c;

border-radius:20px;

padding:20px;

min-height:220px;
}

.route{

font-size:64px;

font-weight:700;

line-height:1;
}

.dest{

font-size:18px;

color:#a0a0a0;

margin-top:10px;

margin-bottom:18px;
}

.eta-main{

font-size:42px;

font-weight:700;

color:#00ff66;

margin-top:10px;
}

.eta-next{

font-size:22px;

color:#888;

margin-top:8px;
}

.arriving{

color:#ffd600;

animation:pulse 1s infinite;
}

@keyframes pulse{

50%{
opacity:0.4;
}

}

.footer{

text-align:center;

color:#666;

margin-top:8px;

font-size:13px;
}

@media(max-width:1024px){

.grid{
grid-template-columns:1fr;
}

.route{
font-size:52px;
}

.clock{
font-size:34px;
}

}

</style>
</head>
<body>

<div class="header">

<div class="header-left">

<div class="title">
🚍 承景街巴士到站時間
</div>

<div class="weather" id="weather">
載入天氣中...
</div>

<div class="warning" id="warning"></div>

</div>

<div class="header-right">

<div class="clock" id="clock">
--
</div>

<div class="date" id="date">
--
</div>

</div>

</div>

<div class="grid">

<div class="card" id="card20A"></div>

<div class="card" id="card22"></div>

<div class="card" id="card22D"></div>

<div class="card" id="card22M"></div>

</div>

<div class="footer">
承景街（003790）｜ 每15秒更新
</div>

<script>

const STOP_ID = "003790";

const ROUTES = [

{
route:"20A",
dest:"高鐵西九龍站"
},

{
route:"22",
dest:"九龍塘（又一城）"
},

{
route:"22D",
dest:"啟德站"
},

{
route:"22M",
dest:"土瓜灣"
}

];

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString("zh-HK");

document.getElementById("date").innerHTML =
now.toLocaleDateString(
"zh-HK",
{
year:"numeric",
month:"long",
day:"numeric",
weekday:"long"
}
);

}

setInterval(updateClock,1000);

updateClock();

function renderCard(route,dest,etas){

const first = etas[0] || "--";
const second = etas[1] || "--";

const arriving =
first.includes("衝呀")
?
"arriving"
:
"";

document.getElementById(
"card"+route
).innerHTML =

`
<div class="route">
${route}
</div>

<div class="dest">
${dest}
</div>

<div class="eta-main ${arriving}">
${first}
</div>

<div class="eta-next">
下班 ${second}
</div>
`;

}

async function loadETA(item){

try{

const res =
await fetch(
`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/ctb/${STOP_ID}/${item.route}`
);

const json =
await res.json();

let etas = [];

if(
json.data &&
json.data.length
){

const buses =
json.data
.filter(x=>x.eta)
.slice(0,2);

for(const bus of buses){

const mins =
Math.round(
(new Date(bus.eta)-new Date())
/
60000
);

if(mins <= 1){

etas.push(
"🏃 衝呀！"
);

}else{

etas.push(
mins + "分鐘"
);

}

}

}

renderCard(
item.route,
item.dest,
etas
);

}catch(e){

renderCard(
item.route,
item.dest,
[]
);

}

}

async function refreshETA(){

for(const item of ROUTES){

await loadETA(item);

}

}

async function loadWeather(){

try{

const res =
await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
);

const data =
await res.json();

const temp =
data.temperature.data[1].value;

const humid =
data.humidity.data[0].value;

document.getElementById(
"weather"
).innerHTML =
`🌡️ ${temp}°C　💧 ${humid}%`;

}catch(e){

}

}

async function loadWarning(){

try{

const res =
await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc"
);

const data =
await res.json();

let warnings=[];

for(const key in data){

if(
data[key] &&
data[key].actionCode !== "CANCEL"
){

warnings.push(
data[key].name
);

}

}

document.getElementById(
"warning"
).innerHTML =

warnings.length
?
"⚠️ " + warnings.join(" ｜ ")
:
"";

}catch(e){

}

}

loadWeather();
loadWarning();
refreshETA();

setInterval(
refreshETA,
15000
);

setInterval(
loadWeather,
600000
);

setInterval(
loadWarning,
300000
);

</script>

</body>
</html>
