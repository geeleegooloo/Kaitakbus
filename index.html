<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>承景街巴士到站時間</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:15px;
}

.header{
background:#d61f26;
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

.title{
font-size:36px;
font-weight:bold;
}

.weather{
margin-top:8px;
font-size:18px;
}

.clock{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

.card{
background:#111;
border-radius:18px;
padding:20px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.route{
font-size:50px;
font-weight:bold;
}

.eta{
font-size:30px;
font-weight:bold;
color:#00ff66;
}

.arriving{
color:#ffd600;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:0.4;
}
}

</style>
</head>
<body>

<div class="header">

<div class="title">
🚍 承景街
</div>

<div class="weather" id="weather">
載入天氣中...
</div>

<div class="clock" id="clock">
--
</div>

</div>

<div class="card">
<div class="route">20A</div>
<div class="eta" id="eta20A">--</div>
</div>

<div class="card">
<div class="route">22</div>
<div class="eta" id="eta22">--</div>
</div>

<div class="card">
<div class="route">22D</div>
<div class="eta" id="eta22D">--</div>
</div>

<div class="card">
<div class="route">22M</div>
<div class="eta" id="eta22M">--</div>
</div>

<script>

const STOP_ID = "003790";
const ROUTES = ["20A","22","22D","22M"];

function updateClock(){
document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString("zh-HK");
}

setInterval(updateClock,1000);
updateClock();

async function loadWeather(){

try{

const res = await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
);

const data = await res.json();

const temp =
data.temperature.data[1].value;

const humidity =
data.humidity.data[0].value;

document.getElementById("weather").innerHTML =
`🌡️ ${temp}°C　💧 ${humidity}%`;

}catch(e){

document.getElementById("weather").innerHTML =
"天氣資料未能載入";

}

}

async function loadETA(route){

try{

const url =
`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/ctb/${STOP_ID}/${route}`;

const res =
await fetch(url);

const json =
await res.json();

const target =
document.getElementById(
"eta"+route
);

if(
!json.data ||
json.data.length===0
){
target.innerHTML="--";
return;
}

const etaTime =
new Date(json.data[0].eta);

const diff =
Math.round(
(etaTime - new Date())
/60000
);

if(diff<=1){

target.innerHTML="即將到站";
target.classList.add("arriving");

}
else{

target.innerHTML=
diff+"分鐘";

target.classList.remove("arriving");

}

}catch(err){

console.log(err);

}

}

async function refresh(){

for(const route of ROUTES){

await loadETA(route);

}

}

loadWeather();

refresh();

setInterval(
refresh,
15000
);

setInterval(
loadWeather,
600000
);

</script>

</body>
</html>
