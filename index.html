<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>承景街巴士資訊</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
background:#d61f26;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:36px;
font-weight:bold;
}

.info{
font-size:20px;
line-height:1.5;
}

.clock{
font-size:42px;
font-weight:bold;
}

iframe{
width:100%;
height:calc(100vh - 140px);
border:none;
background:#fff;
}

</style>
</head>

<body>

<div class="header">

<div>

<div class="title">
🚍 承景街巴士資訊
</div>

<div class="info" id="weather">
載入天氣中...
</div>

</div>

<div class="clock" id="clock">
--
</div>

</div>

hkbustime.com">
</iframe>

<script>

function updateClock(){

document.getElementById("clock").innerHTML=
new Date().toLocaleTimeString("zh-HK");

}

setInterval(updateClock,1000);

updateClock();

async function loadWeather(){

try{

const res =
await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
);

const data =
await res.json();

const temp =
data.temperature.data[1].value;

const humid =
data.humidity.data[0].value;

document.getElementById("weather").innerHTML =
`🌡️ ${temp}°C　💧 ${humid}%`;

}catch(e){

document.getElementById("weather").innerHTML =
"天氣資料未能載入";

}

}

loadWeather();

setInterval(
loadWeather,
600000
);

</script>

</body>
</html>
