<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>承景街巴士到站時間</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:12px;
}

.header{

background:#d61f26;

border-radius:20px;

padding:14px 20px;

margin-bottom:14px;

display:flex;

justify-content:space-between;

align-items:flex-start;

}

.header-left{
flex:1;
}

.header-right{
text-align:right;
}

.title{

font-size:38px;

font-weight:700;

margin-bottom:8px;
}

.weather{

font-size:18px;

margin-bottom:6px;
}

.warning{

font-size:17px;

font-weight:700;

color:#ffe082;
}

.clock{

font-size:52px;

font-weight:700;
}

.date{

font-size:18px;

margin-top:4px;
}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:14px;

}

.card{

background:#070707;

border:1px solid #1a1a1a;

border-radius:22px;

padding:24px;

min-height:260px;
}

.top{

display:flex;

justify-content:space-between;

align-items:flex-start;

margin-bottom:16px;
}

.route{

font-size:72px;

font-weight:700;
}

.dest{

font-size:18px;

color:#aaa;

margin-top:10px;
}

.eta-row{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-top:1px solid #1f1f1f;
}

.bus-label{

font-size:20px;

color:#888;
}

.eta{

font-size:38px;

font-weight:700;

color:#00ff66;
}

.arriving{

color:#ffd600;

animation:pulse 1s infinite;
}

@keyframes pulse{

50%{
opacity:0.4;
}

}

.footer{

text-align:center;

color:#666;

font-size:14px;

margin-top:10px;
}

@media(max-width:1024px){

.grid{
grid-template-columns:1fr;
}

.route{
font-size:56px;
}

.clock{
font-size:40px;
}

}

</style>
</head>
<body>

<div class="header">

<div class="header-left">

<div class="title">
🚍 承景街巴士到站時間
</div>

<div class="weather" id="weather">
載入天氣中...
</div>

<div class="warning" id="warning">
</div>

</div>

<div class="header-right">

<div class="clock" id="clock">
--
</div>

<div class="date" id="date">
--
</div>

</div>

</div>

<div class="grid">

<div class="card" id="card20A"></div>

<div class="card" id="card22"></div>

<div class="card" id="card22D"></div>

<div class="card" id="card22M"></div>

</div>

<div class="footer">
承景街（003790）｜ 每15秒更新
</div>

<script>

const STOP_ID = "003790";

const ROUTES = [

{
route:"20A",
dest:"高鐵西九龍站"
},

{
route:"22",
dest:"九龍塘（又一城）"
},

{
route:"22D",
dest:"啟德站"
},

{
route:"22M",
dest:"土瓜灣"
}

];

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString("zh-HK");

document.getElementById("date").innerHTML =
now.toLocaleDateString(
"zh-HK",
{
year:"numeric",
month:"long",
day:"numeric",
weekday:"long"
}
);

}

setInterval(updateClock,1000);

updateClock();

function renderCard(route,dest,etas){

let html=`

<div class="top">

<div>

<div class="route">
${route}
</div>

<div class="dest">
${dest}
</div>

</div>

</div>

`;

for(let i=0;i<3;i++){

const eta = etas[i] || "--";

const cls =
eta.includes("衝呀")
?
"eta arriving"
:
"eta";

html += `

<div class="eta-row">

<div class="bus-label">
第${i+1}班
</div>

<div class="${cls}">
${eta}
</div>

</div>

`;

}

document.getElementById(
"card"+route
).innerHTML=html;

}

async function loadETA(item){

try{

const res =
await fetch(
`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/ctb/${STOP_ID}/${item.route}`
);

const json =
await res.json();

const etas=[];

if(
json.data &&
json.data.length
){

const buses =
json.data
.filter(x=>x.eta)
.slice(0,3);

for(const bus of buses){

const mins =
Math.round(
(new Date(bus.eta)-new Date())
/
60000
);

if(mins<=1){

etas.push(
"🏃 衝呀！"
);

}else{

etas.push(
mins+"分鐘"
);

}

}

}

renderCard(
item.route,
item.dest,
etas
);

}catch(err){

renderCard(
item.route,
item.dest,
[]
);

}

}

async function refreshETA(){

for(const item of ROUTES){

await loadETA(item);

}

}

async function loadWeather(){

try{

const res =
await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
);

const data =
await res.json();

const temp =
data.temperature.data[1].value;

const humid =
data.humidity.data[0].value;

document.getElementById(
"weather"
).innerHTML =
`🌡️ ${temp}°C　💧 ${humid}%`;

}catch(e){

}

}

async function loadWarning(){

try{

const res =
await fetch(
"https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc"
);

const data =
await res.json();

const warnings=[];

for(const key in data){

if(
data[key] &&
data[key].actionCode !== "CANCEL"
){

warnings.push(
data[key].name
);

}

}

document.getElementById(
"warning"
).innerHTML =
warnings.length
?
"⚠️ " + warnings.join(" ｜ ")
:
"";

}catch(e){

}

}

loadWeather();
loadWarning();
refreshETA();

setInterval(
refreshETA,
15000
);

setInterval(
loadWeather,
600000
);

setInterval(
loadWarning,
300000
);

</script>

</body>
</html>
